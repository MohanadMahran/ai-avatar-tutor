# AI Avatar Tutor - Docker Compose Configuration
version: "3.8"
services:
  ai-avatar-tutor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-avatar-tutor
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./docs:/app/docs
      - ./vector_store:/app/vector_store
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r = httpx.get('http://localhost:8000/api/health'); assert r.status_code == 200"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    environment:
      - PYTHONUNBUFFERED=1